<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1f38"/>
      <stop offset="100%" stop-color="#0a0c14"/>
    </radialGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cf6"/>
      <stop offset="100%" stop-color="#56cfb2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#sparkle)" stroke-width="2" opacity="0.2"/>
  <!-- Inner ring -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="url(#sparkle)" stroke-width="1.5" opacity="0.15"/>

  <!-- Sparkle / star shape (8-pointed) -->
  <g filter="url(#glow)" transform="translate(512,512)">
    <polygon points="0,-200 47,-47 200,0 47,47 0,200 -47,47 -200,0 -47,-47"
             fill="url(#sparkle)" opacity="0.9"/>
    <polygon points="0,-130 30,-30 130,0 30,30 0,130 -30,30 -130,0 -30,-30"
             fill="white" opacity="0.25"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="28" fill="white" opacity="0.95"/>
  </g>
</svg>
